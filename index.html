<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>接地抵抗 合成計算（現場用）</title>
  <style>
    :root { --gap: 10px; }
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
      margin: 0; padding: 16px; background: #f6f7f9; color: #111; }
    .card { background: #fff; border-radius: 14px; padding: 14px; box-shadow: 0 2px 10px rgba(0,0,0,.06); }
    h1 { font-size: 18px; margin: 0 0 10px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--gap); }
    label { font-size: 12px; color: #555; display: block; margin-bottom: 4px; }
    input[type="number"]{
      width: 100%; box-sizing: border-box;
      padding: 12px; font-size: 16px; border: 1px solid #cfd6dd; border-radius: 12px;
      background: #fff;
    }
    .row { display: flex; gap: var(--gap); margin-top: 12px; }
    button{
      flex: 1;
      padding: 12px; font-size: 16px; border: 0; border-radius: 12px;
      background: #111; color: #fff;
    }
    button.secondary{ background: #e9edf2; color: #111; }
    .result{
      margin-top: 12px; padding: 12px; border-radius: 12px;
      background: #0b1220; color: #fff;
    }
    .result .big{ font-size: 26px; font-weight: 700; letter-spacing: .2px; }
    .note { margin-top: 8px; font-size: 12px; color: #666; }
    .warn { margin-top: 10px; font-size: 13px; color: #b00020; }
  </style>
</head>
<body>
  <div class="card">
    <h1>接地抵抗 合成計算（現場用）</h1>

    <div class="grid" id="inputs"></div>

    <div class="row">
      <button type="button" id="calcBtn">計算</button>
      <button type="button" class="secondary" id="resetBtn">リセット</button>
    </div>

    <div class="result" id="resultBox" style="display:none;">
      <div>合成接地抵抗</div>
      <div class="big" id="resultValue">-</div>
      <div class="note" id="usedCount"></div>
    </div>

    <div class="warn" id="warn"></div>
    <div class="note">※空欄は無視 / 0Ω・負数は計算対象外</div>
  </div>

<script>
  // 入力欄を10個生成
  const inputsDiv = document.getElementById('inputs');
  const inputs = [];
  for (let i = 1; i <= 10; i++) {
    const wrap = document.createElement('div');
    const lab = document.createElement('label');
    lab.textContent = `測定値${i}（Ω）`;
    const inp = document.createElement('input');
    inp.type = 'number';
    inp.step = '0.01';
    inp.min = '0';
    inp.inputMode = 'decimal';
    inp.placeholder = '例: 12.3';
    // Enterで計算（スマホの「完了」対応）
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') calc(); });

    wrap.appendChild(lab);
    wrap.appendChild(inp);
    inputsDiv.appendChild(wrap);
    inputs.push(inp);
  }

  const warn = document.getElementById('warn');
  const resultBox = document.getElementById('resultBox');
  const resultValue = document.getElementById('resultValue');
  const usedCount = document.getElementById('usedCount');

  function calc() {
    warn.textContent = '';
    let sum = 0;
    let count = 0;
    let invalid = 0;

    inputs.forEach(inp => {
      const v = parseFloat(inp.value);
      if (inp.value === '') return;               // 空欄は無視
      if (!isFinite(v) || v <= 0) { invalid++; return; } // 0以下は弾く
      sum += 1 / v;
      count++;
    });

    if (count === 0) {
      resultBox.style.display = 'none';
      warn.textContent = '有効な値（0より大きい数値）を1つ以上入力してください。';
      return;
    }

    const R = 1 / sum;
    resultBox.style.display = 'block';
    resultValue.textContent = `${R.toFixed(3)} Ω`;
    usedCount.textContent = `計算に使用：${count}点 / 無効：${invalid}点`;
  }

  function resetAll() {
    inputs.forEach(i => i.value = '');
    warn.textContent = '';
    resultBox.style.display = 'none';
    inputs[0].focus();
  }

  document.getElementById('calcBtn').addEventListener('click', calc);
  document.getElementById('resetBtn').addEventListener('click', resetAll);
</script>
</body>
</html>
